services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: face_guard_web
    depends_on:
      - backend
    ports:
      - "${WEB_PORT}:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: face_guard_backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      RUST_LOG: ${RUST_LOG}

      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}

      DATABASE_URL: ${DATABASE_URL}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS}

      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}

      FACE_EMBEDDING_MODEL_PATH: ${FACE_EMBEDDING_MODEL_PATH}
      FACE_EMBEDDING_MODEL_NAME: ${FACE_EMBEDDING_MODEL_NAME}
      FACE_EMBEDDING_MODEL_PATH_MODEL_VERSION: ${FACE_EMBEDDING_MODEL_PATH_MODEL_VERSION}
      FACE_EMBEDDING_MODEL_DIMENSION: ${FACE_EMBEDDING_MODEL_DIMENSION}

      FACE_DETECTION_MODEL_PATH: ${FACE_DETECTION_MODEL_PATH}
      FACE_DETECTION_MODEL_NAME: ${FACE_DETECTION_MODEL_NAME}
      FACE_DETECTION_MODEL_VERSION: ${FACE_DETECTION_MODEL_VERSION}
      FACE_DETECTION_INPUT_SIZE: ${FACE_DETECTION_INPUT_SIZE}
      FACE_DETECTION_CONFIDENCE_THRESHOLD: ${FACE_DETECTION_CONFIDENCE_THRESHOLD}
      FACE_DETECTION_NMS_THRESHOLD: ${FACE_DETECTION_NMS_THRESHOLD}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    container_name: face_guard_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - face_guard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: face_guard_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - face_guard_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc
    container_name: face_guard_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${S3_BUCKET} || true;
      mc anonymous set none local/${S3_BUCKET};
      exit 0;
      "

volumes:
  face_guard_postgres_data:
  face_guard_minio_data:
